name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test -- --run

      - run: npm run test:coverage
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        env:
          EMAIL_PRIMARY: ${{ secrets.EMAIL_PRIMARY }}
          PASSWORD_PRIMARY: ${{ secrets.PASSWORD_PRIMARY }}
          EMAIL_SECONDARY: ${{ secrets.EMAIL_SECONDARY }}
          PASSWORD_SECONDARY: ${{ secrets.PASSWORD_SECONDARY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
