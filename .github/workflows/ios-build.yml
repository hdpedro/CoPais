name: iOS Build & Upload

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: 'Upload to TestFlight/App Store?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    tags:
      - 'v*'
    branches:
      - ios-run

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_ID: com.kindar.app
      SCHEME: App
      XCODE_WORKSPACE: ios/App/App.xcworkspace
      CAPACITOR_TELEMETRY: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (CocoaPods template)
        run: |
          echo "=== Running cap add ios with CocoaPods template ==="
          npx cap add ios --packagemanager CocoaPods
          echo "=== Verifying Podfile ==="
          test -f ios/App/Podfile && echo "OK: Podfile exists" || { echo "ERROR: Podfile missing"; exit 1; }

      - name: Copy native plugins
        run: |
          cp ios-plugins/StoreKitPlugin.swift ios/App/App/ 2>/dev/null || true
          cp ios-plugins/StoreKitPlugin.m ios/App/App/ 2>/dev/null || true

      - name: Sync Capacitor (copies web assets)
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update
          test -f App.xcworkspace/contents.xcworkspacedata && echo "OK: xcworkspace ready" || { echo "ERROR: xcworkspace not ready"; exit 1; }

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Write ASC API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_736GBBC4YY.p8

      - name: Build & Archive (automatic signing)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Kindar.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_ID" \
            MARKETING_VERSION="1.0.0" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_736GBBC4YY.p8" \
            -authenticationKeyID "736GBBC4YY" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            | xcpretty

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Kindar.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_736GBBC4YY.p8" \
            -authenticationKeyID "736GBBC4YY" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            | xcpretty

      - name: Upload to TestFlight
        if: inputs.upload_to_appstore != 'false' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/ios-run'
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "IPA: $IPA_PATH"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "736GBBC4YY" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" \
            --apiKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_736GBBC4YY.p8" \
            --verbose

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kindar-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.appstoreconnect/private_keys/AuthKey_736GBBC4YY.p8
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
