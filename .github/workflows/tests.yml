name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test -- --run

      - run: npm run test:coverage
        continue-on-error: true

  auto-fix-tests:
    name: Auto-Fix Verification
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-fix')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run scoped tests for changed folders
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^src/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No src/ files changed, running all tests"
            npm run test -- --run
          else
            FOLDERS=$(echo "$CHANGED" | cut -d/ -f2 | sort -u)
            echo "Changed folders: $FOLDERS"
            for folder in $FOLDERS; do
              echo "Running tests for $folder..."
              npm run test -- --run "tests/**/${folder}*" || true
            done
          fi

      - run: npm run lint

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        env:
          EMAIL_PRIMARY: ${{ secrets.EMAIL_PRIMARY }}
          PASSWORD_PRIMARY: ${{ secrets.PASSWORD_PRIMARY }}
          EMAIL_SECONDARY: ${{ secrets.EMAIL_SECONDARY }}
          PASSWORD_SECONDARY: ${{ secrets.PASSWORD_SECONDARY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
